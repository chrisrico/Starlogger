<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Starlogger</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="scanlines" aria-hidden="true"></div>
<div class="app">
  <aside id="sidebar" class="sidebar" aria-label="Primary navigation">
    <div class="sb-brand">
      <img class="glyph" src="/logo.svg" alt="" width="30" height="30">
      <h1>STARLOGGER <em>// cargo ops</em></h1>
    </div>
    <nav id="nav">
      <button data-tab="missions" class="active" title="Contracts">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4h6l4 4v12H8z"/><path d="M14 4v4h4"/><path d="M10.5 12h5M10.5 15.5h5"/></svg><span class="lbl">Contracts</span></button>
      <button data-tab="loading" title="Loading">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v10"/><path d="M8 9.5 12 13.5 16 9.5"/><path d="M5 16v3h14v-3"/></svg><span class="lbl">Loading</span></button>
      <button data-tab="grid" title="Manifest">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg><span class="lbl">Manifest</span></button>
      <button data-tab="unloading" title="Unloading">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 13.5v-10"/><path d="M8 7.5 12 3.5 16 7.5"/><path d="M5 16v3h14v-3"/></svg><span class="lbl">Unloading</span></button>
      <button data-tab="routes" title="Routes">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="6" r="2.2"/><circle cx="6" cy="18" r="2.2"/><circle cx="18" cy="12" r="2.2"/><path d="M8 7.1 15.8 11M8 16.9 15.8 13"/></svg><span class="lbl">Routes</span></button>
      <button data-tab="history" title="Archive">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="4" rx="1"/><path d="M5.5 9v9.5h13V9"/><path d="M10 13h4"/></svg><span class="lbl">Archive</span></button>
      <button data-tab="mining" class="hide" title="Mining">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12l3 5-9 11L3 9z"/><path d="M3 9h18M9 4 7 9l5 11M15 4l2 5-5 11"/></svg><span class="lbl">Mining</span></button>
    </nav>
    <button id="navtoggle" class="sb-collapse" aria-controls="sidebar" aria-expanded="true" title="Collapse sidebar">
      <svg class="sb-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 7 9 12l5 5"/></svg><span class="lbl">Collapse</span>
    </button>
  </aside>
  <div class="content">
    <header>
      <div class="bar">
        <div class="controls">
          <div class="status" id="status"></div>
        </div>
      </div>
      <div class="readouts" id="stats"></div>
      <div class="gauge" id="capacity"></div>
    </header>
    <div id="replaybar" class="hide"></div>
    <main>
      <div id="missions" class="tab"></div>
      <div id="loading" class="tab hide"></div>
      <div id="unloading" class="tab hide"></div>
      <div id="routes" class="tab hide"></div>
      <div id="grid" class="tab hide"></div>
      <div id="history" class="tab hide"></div>
      <div id="mining" class="tab hide"></div>
    </main>
    <footer id="foot">establishing uplink…</footer>
  </div>
</div>
<div id="datalists" hidden></div>
<script src="/cargogrid.js"></script>
<script src="/app.js"></script>
</body>
</html>
