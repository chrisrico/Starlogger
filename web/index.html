<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Starlogger</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="scanlines" aria-hidden="true"></div>
<div class="app">
  <aside id="sidebar" class="sidebar" aria-label="Primary navigation">
    <div class="sb-brand">
      <img class="glyph" src="/logo.svg" alt="" width="30" height="30">
      <h1>STARLOGGER</h1>
    </div>
    <nav id="nav">
      <a data-tab="contracts" href="/contracts" class="active" title="Contracts">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4h6l4 4v12H8z"/><path d="M14 4v4h4"/><path d="M10.5 12h5M10.5 15.5h5"/></svg><span class="lbl">Contracts</span></a>
      <a data-tab="signal" href="/signal" title="Signal ID">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="18" r="1.5"/><path d="M8.5 14.6a5 5 0 0 1 7 0M5.6 11.6a9 9 0 0 1 12.8 0"/></svg><span class="lbl">Signal ID</span></a>
      <a data-tab="cargo" href="/cargo" title="Cargo">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 4 7v10l8 4 8-4V7z"/><path d="M4 7l8 4 8-4M12 11v10"/></svg><span class="lbl">Cargo</span></a>
      <a data-tab="plan" href="/plan" title="Plan">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="6" r="2.2"/><circle cx="6" cy="18" r="2.2"/><circle cx="18" cy="12" r="2.2"/><path d="M8 7.1 15.8 11M8 16.9 15.8 13"/></svg><span class="lbl">Plan</span></a>
      <a data-tab="archive" href="/archive" title="Archive">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="4" rx="1"/><path d="M5.5 9v9.5h13V9"/><path d="M10 13h4"/></svg><span class="lbl">Archive</span></a>
      <a data-tab="minerals" href="/minerals" class="hide" title="Minerals">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h12l3 5-9 11L3 9z"/><path d="M3 9h18M9 4 7 9l5 11M15 4l2 5-5 11"/></svg><span class="lbl">Minerals</span></a>
      <a data-tab="blueprint" href="/blueprint" class="hide" title="Blueprints">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v16H5z"/><path d="M5 9h14M10 4v16"/><path d="M12.5 12h4.5v4.5h-4.5z"/></svg><span class="lbl">Blueprints</span></a>
      <a data-tab="salvage" href="/salvage" class="hide" title="Salvage">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.5 2.5-2.4-.6-.6-2.4z"/></svg><span class="lbl">Salvage</span></a>
    </nav>
    <button id="navjukebox" class="sb-settings" title="Jukebox" aria-haspopup="dialog">
      <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg><span class="lbl">Jukebox</span></button>
    <button id="navsettings" class="sb-settings" title="Settings" aria-haspopup="dialog">
      <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="lbl">Settings</span></button>
    <button id="navtoggle" class="sb-collapse" aria-controls="sidebar" aria-expanded="true" title="Collapse sidebar">
      <svg class="sb-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 7 9 12l5 5"/></svg><span class="lbl">Collapse</span>
    </button>
  </aside>
  <div class="content">
    <div id="updatebar" class="hide"></div>
    <header>
      <div class="bar">
        <div class="connstatus" id="connpill"></div>
        <div class="controls">
          <div class="modesw" id="modeswitch" role="group" aria-label="View mode"></div>
          <div class="status" id="status"></div>
        </div>
      </div>
      <div class="readouts" id="stats"></div>
      <div class="gauge" id="capacity"></div>
    </header>
    <div id="replaybar" class="hide"></div>
    <main>
      <div id="contracts" class="tab"></div>
      <div id="signal" class="tab hide"></div>
      <div id="cargo" class="tab hide"></div>
      <div id="plan" class="tab hide"></div>
      <div id="archive" class="tab hide"></div>
      <div id="minerals" class="tab hide"></div>
      <div id="blueprint" class="tab hide"></div>
      <div id="salvage" class="tab hide"></div>
    </main>
    <footer id="foot">establishing uplink…</footer>
  </div>
</div>
<div id="datalists" hidden></div>
<div id="toaster" class="toaster" aria-live="polite"></div>
<div id="settingsOverlay" class="ovl hide" aria-hidden="true">
  <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="sp-head">
      <h2 id="settingsTitle">Settings</h2>
      <button class="sp-x" id="settingsClose" title="Close" aria-label="Close settings">✕</button>
    </div>
    <div id="settingsBody" class="sp-body"></div>
    <div class="sp-foot">
      <span id="settingsMsg" class="sp-msg"></span>
      <button class="sp-btn" id="settingsCancel">Close</button>
      <button class="sp-btn primary" id="settingsSave">Save</button>
    </div>
  </div>
</div>
<div id="jukeboxOverlay" class="ovl hide" aria-hidden="true">
  <div class="settings-panel juke-panel" role="dialog" aria-modal="true" aria-labelledby="jukeTitle">
    <div class="sp-head">
      <h2 id="jukeTitle">Jukebox</h2>
      <button class="sp-x" id="jukeboxClose" title="Close" aria-label="Close jukebox">✕</button>
    </div>
    <div id="jukeboxBody" class="sp-body juke-body"></div>
    <div id="jukeboxFoot" class="juke-foot"></div>
  </div>
</div>
<div id="shipEquipOverlay" class="ovl hide" aria-hidden="true">
  <div class="settings-panel se-panel" role="dialog" aria-modal="true" aria-labelledby="seTitle">
    <div class="sp-head">
      <h2 id="seTitle">Ship equipment</h2>
      <button class="sp-x" id="seClose" title="Close" aria-label="Close equipment">✕</button>
    </div>
    <div id="seBody" class="sp-body"></div>
    <div class="sp-foot">
      <span id="seMsg" class="sp-msg"></span>
      <button class="sp-btn" id="seCancel">Close</button>
      <button class="sp-btn primary" id="seSave">Save</button>
    </div>
  </div>
</div>
<script src="/cargogrid.js"></script>
<script src="/feasibility.js"></script>
<script type="module" src="/app.js"></script>
</body>
</html>
