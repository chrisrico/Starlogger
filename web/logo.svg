<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Starlogger">
  <defs>
    <linearGradient id="sl-star" x1="32" y1="2" x2="32" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9af3ff"/>
      <stop offset=".55" stop-color="#4fdcff"/>
      <stop offset="1" stop-color="#1aa6d6"/>
    </linearGradient>
    <filter id="sl-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- telemetry orbit -->
  <ellipse cx="32" cy="32" rx="25" ry="9.5" transform="rotate(-27 32 32)"
           stroke="#4fdcff" stroke-opacity=".5" stroke-width="1.4"/>
  <!-- accent star -->
  <path d="M51 9 L53 14.5 L58.5 16.5 L53 18.5 L51 24 L49 18.5 L43.5 16.5 L49 14.5 Z"
        fill="#4fdcff" fill-opacity=".85"/>
  <!-- primary north-star sparkle -->
  <path d="M32 3 L38 26 L61 32 L38 38 L32 61 L26 38 L3 32 L26 26 Z"
        fill="url(#sl-star)" filter="url(#sl-glow)"/>
  <!-- tracked-target center node -->
  <circle cx="32" cy="32" r="3.4" fill="#06101e"/>
  <circle cx="32" cy="32" r="1.5" fill="#bdf5ff"/>
</svg>
